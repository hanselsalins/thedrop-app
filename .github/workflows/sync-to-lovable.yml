name: Sync to Lovable

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push to Lovable repo
        run: |
          git config user.email "hanselsalins@gmail.com"
          git config user.name "hanselsalins"
          git remote add lovable https://x-access-token:${{ secrets.LOVABLE_SYNC_TOKEN }}@github.com/hanselsalins/the-drop-news.git
          git push lovable main --force

