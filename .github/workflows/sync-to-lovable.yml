name: Sync to Lovable

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.LOVABLE_DEPLOY_KEY }}

      - name: Push to Lovable repo
        run: |
          git config user.email "hanselsalins@gmail.com"
          git config user.name "hanselsalins"
          git remote add lovable git@github.com:hanselsalins/the-drop-news.git
          git push lovable main --force
